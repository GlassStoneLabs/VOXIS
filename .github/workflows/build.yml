name: Build Voxis 4.0 DENSE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── System deps ───────────────────────────────────────────────────────
      - name: Install FFmpeg
        run: brew install ffmpeg

      # ── Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          # Pin setuptools and numpy for PyInstaller compatibility
          python -m pip install "setuptools==69.5.1" "numpy<2.0"
          python -m pip install -r trinity_engine/requirements.txt
          python -m pip install pyinstaller

      # ── Build Trinity V8.1 Engine (PyInstaller) ───────────────────────────
      - name: Build Trinity Engine Binary
        run: |
          pyinstaller --noconfirm --clean trinity_v8.1_core.spec

      - name: Stage Engine Binary
        run: |
          mkdir -p app/resources/bin
          cp dist/trinity_v8_core app/resources/bin/trinity_v8_core
          chmod +x app/resources/bin/trinity_v8_core

      # ── Build Electron App ────────────────────────────────────────────────
      - name: Install Frontend Dependencies
        working-directory: app
        run: npm ci

      - name: Build Electron App (DMG)
        working-directory: app
        run: npm run electron:build

      # ── Upload Installer ──────────────────────────────────────────────────
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Voxis-4.0-DENSE-macOS-arm64
          path: app/release/*.dmg
          if-no-files-found: error
