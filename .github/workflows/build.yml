name: Build Voxis 4.0 DENSE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── System deps ───────────────────────────────────────────────────────
      - name: Install FFmpeg
        run: brew install ffmpeg

      # ── Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          # Pin setuptools and numpy for PyInstaller compatibility
          python -m pip install "setuptools==69.5.1" "numpy<2.0"
          python -m pip install -r trinity_engine/requirements.txt
          python -m pip install pyinstaller

      # ── Build PhaseLimiter native binary (Apple Accelerate) ──────────────
      - name: Install PhaseLimiter build deps
        run: brew install boost libsndfile tbb libpng zlib fftw

      - name: Build PhaseLimiter (ARM64 native)
        run: |
          cd trinity_engine/modules/external/phase
          chmod +x build_macos_native.sh
          ./build_macos_native.sh
        continue-on-error: true

      # ── Build Trinity V8.2 Engine (PyInstaller) ───────────────────────────
      - name: Build Trinity Engine Binary
        run: |
          pyinstaller --noconfirm --clean trinity_v8_core.spec

      - name: Stage Engine Binary
        run: |
          mkdir -p app/resources/bin
          cp dist/trinity_v8_core app/resources/bin/trinity_v8_core
          chmod +x app/resources/bin/trinity_v8_core

      # ── Build Electron App ────────────────────────────────────────────────
      - name: Install Frontend Dependencies
        working-directory: app
        run: npm ci

      - name: Build Electron App (DMG)
        working-directory: app
        run: npm run electron:build

      # ── Upload Installer ──────────────────────────────────────────────────
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Voxis-4.0-DENSE-macOS-arm64
          path: app/release/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── FFmpeg for Windows ────────────────────────────────────────────────
      - name: Download FFmpeg (Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffDir = (Get-ChildItem ffmpeg_tmp -Directory)[0].FullName
          New-Item -ItemType Directory -Force -Path app/resources/bin | Out-Null
          Copy-Item "$ffDir\bin\ffmpeg.exe"  app/resources/bin/
          Copy-Item "$ffDir\bin\ffprobe.exe" app/resources/bin/
          Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force

      # ── Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install "setuptools==69.5.1" "numpy<2.0"
          # CPU-only torch in CI (no GPU on GitHub runners)
          python -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r trinity_engine/requirements.txt
          python -m pip install pyinstaller

      # ── Download PhaseLimiter prebuilt (Windows x64) ─────────────────────
      - name: Download PhaseLimiter binary
        shell: pwsh
        run: |
          $plUrl = "https://github.com/ai-mastering/phaselimiter/releases/download/v0.2.0/phaselimiter-win.zip"
          $plZip = "$env:TEMP\phaselimiter-win.zip"
          $plExtract = "$env:TEMP\phaselimiter-extract"
          Invoke-WebRequest -Uri $plUrl -OutFile $plZip -UseBasicParsing
          Expand-Archive -Path $plZip -DestinationPath $plExtract -Force
          $found = Get-ChildItem -Path $plExtract -Recurse -Filter "phase_limiter.exe" | Select-Object -First 1
          if ($found) {
            $destDir = "trinity_engine\modules\external\phase\bin\Release"
            New-Item -ItemType Directory -Force -Path $destDir | Out-Null
            Copy-Item $found.FullName "$destDir\phase_limiter.exe" -Force
            Write-Host "PhaseLimiter installed: $destDir\phase_limiter.exe"
          }
          # Copy resource dir
          $resDir = Get-ChildItem -Path $plExtract -Recurse -Directory -Filter "resource" | Select-Object -First 1
          if ($resDir) {
            $dstRes = "trinity_engine\modules\external\phase\resource"
            if (-not (Test-Path $dstRes)) { Copy-Item $resDir.FullName $dstRes -Recurse -Force }
          }
        continue-on-error: true

      # ── Build Trinity V8.2 Engine ─────────────────────────────────────────
      - name: Build Trinity Engine Binary (Windows)
        shell: pwsh
        run: pyinstaller --noconfirm --clean trinity_v8_core_win.spec

      - name: Stage Engine Binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path app/resources/bin | Out-Null
          Copy-Item dist/trinity_v8_core.exe app/resources/bin/trinity_v8_core.exe

      # ── Build Electron App ────────────────────────────────────────────────
      - name: Install Frontend Dependencies
        working-directory: app
        run: npm ci

      - name: Build Electron App (NSIS)
        working-directory: app
        run: npm run electron:build:win

      # ── Upload Installer ──────────────────────────────────────────────────
      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Voxis-4.0-DENSE-Windows-x64
          path: app/release/*.exe
          if-no-files-found: error
