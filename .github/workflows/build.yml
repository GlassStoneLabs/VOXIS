name: Build Voxis 4.0 DENSE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          default: true

      # ── Platform-specific deps ────────────────────────────────────────

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg -y

      # ── Python deps ───────────────────────────────────────────────────

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r trinity_engine/requirements.txt
          python -m pip install pyinstaller

      # ── Build Trinity V8 Engine (PyInstaller) ─────────────────────────

      - name: Build Trinity Engine Binary
        run: |
          pyinstaller --noconfirm --clean trinity_v8_core.spec

      - name: Stage Engine Binary
        shell: bash
        run: |
          mkdir -p app/src-tauri/binaries
          cp "dist/trinity_v8_core${{ matrix.binary_ext }}" \
             "app/src-tauri/binaries/trinity_v8_core-${{ matrix.target }}${{ matrix.binary_ext }}"
          chmod +x "app/src-tauri/binaries/trinity_v8_core-${{ matrix.target }}${{ matrix.binary_ext }}" || true

      # ── Build Tauri Desktop App ───────────────────────────────────────

      - name: Install Frontend Dependencies
        working-directory: app
        run: npm install

      - name: Build Tauri App
        working-directory: app
        run: npm run tauri build

      # ── Upload Installers ─────────────────────────────────────────────

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Voxis-macOS-DMG
          path: app/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows EXE Installer (NSIS)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Voxis-Windows-Installer
          path: app/src-tauri/target/release/bundle/nsis/*.exe
